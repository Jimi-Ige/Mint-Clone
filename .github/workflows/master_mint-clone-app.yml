name: Build and deploy Node.js app to Azure Web App - mint-clone-app

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client and server
        run: npm run build

      - name: Create deployment package
        run: |
          mkdir -p deploy/client/dist deploy/server/dist deploy/server/dist/db/migrations
          cp -r client/dist/* deploy/client/dist/
          cp -r server/dist/* deploy/server/dist/
          cp package.json package-lock.json deploy/
          cp client/package.json deploy/client/
          cp server/package.json deploy/server/
          cd deploy && npm ci --omit=dev --ignore-scripts

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9FD4C8F9B18641AAA463053769C7C8A5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CF50C40720C64FE590C82F40CB245162 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F71AE67308764CC594DA3A8726038D75 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mint-clone-app'
          slot-name: 'Production'
          package: .
          startup-command: 'node server/dist/index.js'
